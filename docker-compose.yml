services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: legal_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             (python manage.py loaddata fixtures/initial_groups.json || true) &&
             (python manage.py createsuperuser --noinput || true) &&
             (python manage.py load_legal_data || true) &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
