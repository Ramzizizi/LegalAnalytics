{% comment %}
Включается в карточки: {% include 'knowledge/_graph.html' with graph_url=... %}
{% endcomment %}
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
        <span class="fw-semibold"><i class="bi bi-diagram-3 me-1"></i>Граф связей</span>
        <small class="text-muted">Клик по узлу открывает карточку</small>
    </div>
    <div class="card-body p-0">
        <div id="graph-container"
             data-graph-url="{{ graph_url }}"
             style="height: 360px; background: #f8f9fa; border-radius: 0 0 .375rem .375rem;">
            <div class="d-flex justify-content-center align-items-center h-100 text-muted">
                <span class="spinner-border spinner-border-sm me-2"></span> Загрузка графа…
            </div>
        </div>
    </div>
    <div class="card-footer bg-transparent border-0 py-2">
        <div class="d-flex gap-3 small text-muted justify-content-center">
            <span><span class="badge bg-primary me-1">&nbsp;</span>Норма права</span>
            <span><span class="badge bg-success me-1">&nbsp;</span>Судебная практика</span>
            <span><span class="badge bg-warning text-dark me-1">&nbsp;</span>Заключение</span>
            <span><span class="badge bg-dark me-1">&nbsp;</span>Текущий документ</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
(function () {
    const container = document.getElementById('graph-container');
    const url = container.dataset.graphUrl;

    fetch(url, {headers: {'X-Requested-With': 'XMLHttpRequest'}})
        .then(r => r.json())
        .then(data => {
            if (!data.nodes || data.nodes.length <= 1) {
                container.innerHTML =
                    '<div class="d-flex justify-content-center align-items-center h-100 text-muted small">' +
                    '<i class="bi bi-diagram-3 me-2"></i>Нет связанных материалов</div>';
                return;
            }

            const colorMap = {
                norm:    {background: '#cfe2ff', border: '#0d6efd', highlight: {background: '#9ec5fe', border: '#0a58ca'}},
                case:    {background: '#d1e7dd', border: '#198754', highlight: {background: '#a3cfbb', border: '#146c43'}},
                opinion: {background: '#fff3cd', border: '#ffc107', highlight: {background: '#ffe69c', border: '#cc9a06'}},
                center:  {background: '#343a40', border: '#000',    font: {color: '#fff'},
                          highlight: {background: '#495057', border: '#000'}},
            };

            const nodes = new vis.DataSet(data.nodes.map(n => ({
                id: n.id,
                label: n.label,
                title: n.title,
                color: colorMap[n.group] || colorMap.norm,
                font: n.group === 'center' ? {color: '#fff', size: 13, bold: true} : {size: 12},
                shape: 'box',
                margin: 8,
                _url: n.url,
            })));

            const edges = new vis.DataSet(data.edges.map((e, i) => ({
                id: i,
                from: e.from,
                to: e.to,
                color: {color: '#adb5bd', highlight: '#6c757d'},
                width: 1.5,
            })));

            const network = new vis.Network(container, {nodes, edges}, {
                layout: {improvedLayout: true},
                physics: {
                    enabled: true,
                    barnesHut: {gravitationalConstant: -4000, springLength: 130},
                    stabilization: {iterations: 150},
                },
                interaction: {hover: true, tooltipDelay: 200, navigationButtons: false},
                edges: {smooth: {type: 'curvedCW', roundness: 0.15}},
            });

            network.on('click', function (params) {
                if (params.nodes.length > 0) {
                    const node = nodes.get(params.nodes[0]);
                    if (node && node._url) window.location.href = node._url;
                }
            });
            network.on('hoverNode', function () {
                container.style.cursor = 'pointer';
            });
            network.on('blurNode', function () {
                container.style.cursor = 'default';
            });
        })
        .catch(() => {
            container.innerHTML =
                '<div class="d-flex justify-content-center align-items-center h-100 text-muted small">' +
                '<i class="bi bi-exclamation-triangle me-2"></i>Не удалось загрузить граф</div>';
        });
}());
</script>
