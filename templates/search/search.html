{% extends 'base.html' %}

{% block title %}Поиск — База правовой аналитики{% endblock %}

{% block content %}
<div class="container">
    <h1 class="h4 mb-3">Поиск по базе</h1>
    <form method="get" class="mb-4">
        <div class="input-group input-group-lg">
            <input type="text" name="q" value="{{ query }}" class="form-control"
                   placeholder="Введите запрос (например: договор аренды)">
            <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> Найти</button>
        </div>
    </form>
    <p class="text-muted">Поиск будет доступен после настройки (Этап 4).</p>
</div>
{% endblock %}
